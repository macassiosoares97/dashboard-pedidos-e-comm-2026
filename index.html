<script>
        let raw2026 = []; let raw2025 = []; let rawDatabase = [];
        let chartMensal = null; let chartMotivos = null; let currentKpiFilter = 'ALL';
        let globalTableData = []; let globalLastCalculatedMetrics = {};
        let pedidosTratadosManualmente = new Set();
        let globalMesesDataCache = {}; 

        const yearSelect = document.getElementById('yearFilter');
        const monthSelect = document.getElementById('monthFilter');
        const searchInput = document.getElementById('searchFilter');
        const channelSelect = document.getElementById('channelFilter');
        const statusLogFilter = document.getElementById('statusLogFilter');
        const criticalSelect = document.getElementById('criticalFilter');
        const btnExportar = document.getElementById('btnExportar');
        const btnExportInsights = document.getElementById('btnExportInsights');
        
        const iaInput = document.getElementById('iaPromptInput');
        const iaBtn = document.getElementById('btnExecutePrompt');
        const iaResponseBox = document.getElementById('iaResponseBox');

        const nomeMeses = {"01":"Janeiro","02":"Fevereiro","03":"Março","04":"Abril","05":"Maio","06":"Junho","07":"Julho","08":"Agosto","09":"Setembro","10":"Outubro","11":"Novembro","12":"Dezembro"};
        const mapaTextoMeses = {"JAN":"01","FEB":"02","FEV":"02","MAR":"03","APR":"04","ABR":"04","MAY":"05","MAI":"05","JUN":"06","JUL":"07","AUG":"08","AGO":"08","SEP":"09","SET":"09","OCT":"10","OUT":"10","NOV":"11","DEC":"12","DEZ":"12"};

        function harmonizarCanal(txt) {
            if (!txt) return "SITE E-COMMERCE B2C";
            let c = txt.toString().toUpperCase().trim();
            if (c.includes("MELI") || c.includes("MERCADO")) return c.includes("SC") ? "MERCADO LIVRE SC" : "MERCADO LIVRE B2C";
            if (c.includes("ECOMMERCE") || c.includes("SITE") || c.includes("LOJA")) return "SITE E-COMMERCE B2C";
            if (c.includes("AMAZON")) return "AMAZON B2C";
            if (c.includes("SHOPEE")) return "SHOPEE HEALTH";
            return c;
        }

        function extrairPeriodo(dataStr, defaultAno) {
            if (!dataStr || dataStr.toString().trim() === "") return { sortKey: `${defaultAno}-05`, label: `05/${defaultAno}`, ano: defaultAno, mes: "05" };
            let limpo = dataStr.toString().toUpperCase().trim();
            let partes = limpo.includes('/') ? limpo.split('/') : (limpo.includes('-') ? limpo.split('-') : []);
            if (partes.length >= 2) {
                let mesToken = partes[1].trim();
                let anoToken = partes[2] ? partes[2].replace(/[^0-9]/g, '').trim() : defaultAno;
                if (anoToken.length < 4) {
                    if (anoToken.length === 2) anoToken = "20" + anoToken;
                    else anoToken = defaultAno;
                }
                let mesNum = "05";
                if (!isNaN(mesToken) && mesToken !== "") {
                    mesNum = mesToken.padStart(2, '0');
                } else { 
                    let trecho = mesToken.substring(0, 3); 
                    if (mapaTextoMeses[trecho]) mesNum = mapaTextoMeses[trecho]; 
                }
                return { sortKey: `${anoToken}-${mesNum}`, label: `${mesNum}/${anoToken}`, ano: anoToken, mes: mesNum };
            }
            return { sortKey: `${defaultAno}-05`, label: `05/${defaultAno}`, ano: defaultAno, mes: "05" };
        }

        function processarlinhasCSV(data, defaultAno) {
            if(!data || data.length === 0) return [];
            let rawHeaders = Object.keys(data[0]);
            let headerMap = {};
            rawHeaders.forEach(h => { if (h) headerMap[h.toUpperCase().trim().replace(/[\u200B-\u200D\uFEFF]/g, '')] = h; });

            function getVal(row, keyKeywords) {
                for (let k of Object.keys(headerMap)) {
                    if (keyKeywords.some(kw => k.includes(kw))) return row[headerMap[k]] ? row[headerMap[k]].toString().trim() : '';
                }
                return '';
            }

            return data.map(row => {
                let n = {
                    PEDIDO: getVal(row, ["PEDIDO", "Nº", "NPEDIDO", "NUMERO", "ID"]),
                    DATA: getVal(row, ["DATA", "EMISSAO", "CRIADO"]),
                    CANAL: getVal(row, ["CANAL", "MARKETPLACE", "ORIGEM", "FONTE"]),
                    STATUS_LOG: getVal(row, ["STATUS_LOG", "SITUACAO", "STATUS", "ETAPA"]),
                    RASTREIO: getVal(row, ["RASTREIO", "TRACKING", "CORREIO"]),
                    PREVISAO: getVal(row, ["PREVISAO", "ENTREGA", "SLA"]),
                    PV_PROTHEUS: getVal(row, ["PV", "PEDIDO_VENDA", "PROTHEUS"]),
                    NOTA: getVal(row, ["NOTA", "NF", "NFE", "FATURA"]),
                    STATUS_LINX: getVal(row, ["LINX", "STATUS_LINX", "INTEGRACAO"]),
                    OBSERVACOES: getVal(row, ["OBS", "MOTIVO", "DETALHE", "MENSAGEM"])
                };

                if (!n.PEDIDO && rawHeaders[0]) n.PEDIDO = row[rawHeaders[0]];
                let p = extrairPeriodo(n.DATA, defaultAno);
                n['ANO_TRATADO'] = p.ano; n['MES_TRATADO'] = p.mes; n['PERIODO_LABEL'] = p.label; n['PERIODO_SORT'] = p.sortKey;

                let stLog = n.STATUS_LOG.toUpperCase(); let obs = n.OBSERVACOES.toUpperCase();
                let faturado = stLog.includes('FATURAD') || stLog.includes('EMITID') || stLog.includes('CONCLU') || n.NOTA !== '';
                let cancelado = stLog.includes('CANC') || stLog.includes('DEV') || stLog.includes('ESTORN') || obs.includes('SALDO ZERADO') || obs.includes('FALTA');

                if (faturado) n['STATUS_CONSOLIDADO'] = 'FATURADO';
                else if (cancelado) n['STATUS_CONSOLIDADO'] = 'CANCELADO';
                else n['STATUS_CONSOLIDADO'] = 'PENDENTE';

                let acao = "Fluxo Concluído"; let riscoIntegracao = false;
                if (n['STATUS_CONSOLIDADO'] === 'PENDENTE') {
                    if ((n.STATUS_LINX.toUpperCase().includes("FATUR") || n.STATUS_LINX.toUpperCase().includes("INTEGR")) && !n.NOTA) riscoIntegracao = true;
                    acao = riscoIntegracao ? "🔌 Forçar Conexão de API (Risco Reclamação B2C)" : "⏳ Despachar imediatamente (SLA Curto)";
                } else if (n['STATUS_CONSOLIDADO'] === 'CANCELADO') {
                    acao = "Estornar Cartão / Evitar ReclameAqui";
                }
                n['ACAO_OPERACIONAL'] = acao; n['RISCO_INTEGRACAO'] = riscoIntegracao;
                return n;
            }).filter(r => r.PEDIDO && r.PEDIDO.toString().trim() !== "");
        }

        function togglePedidoTratado(idPedido) {
            if (pedidosTratadosManualmente.has(idPedido)) pedidosTratadosManualmente.delete(idPedido);
            else pedidosTratadosManualmente.add(idPedido);
            applyFiltersAndRender();
        }

        function mergeDatabases() {
            rawDatabase = [...raw2026, ...raw2025];
            if(rawDatabase.length > 0) {
                criticalSelect.disabled = false; btnExportar.disabled = false; btnExportInsights.disabled = false;
                iaInput.disabled = false; iaBtn.disabled = false;
                buildCrossFilters(); applyFiltersAndRender();
            }
        }

        document.getElementById('csvFileInput2026').addEventListener('change', e => {
            if (!e.target.files[0]) return;
            Papa.parse(e.target.files[0], { header: true, skipEmptyLines: true, complete: res => { raw2026 = processarlinhasCSV(res.data, "2026"); mergeDatabases(); } });
        });

        document.getElementById('csvFileInput2025').addEventListener('change', e => {
            if (!e.target.files[0]) return;
            Papa.parse(e.target.files[0], { header: true, skipEmptyLines: true, complete: res => { raw2025 = processarlinhasCSV(res.data, "2025"); mergeDatabases(); } });
        });

        function buildCrossFilters() {
            let anos = new Set(); let mesesValidos = {}; let channels = new Set(); let statusLogs = new Set();
            rawDatabase.forEach(row => {
                anos.add(row['ANO_TRATADO']); mesesValidos[row['MES_TRATADO']] = nomeMeses[row['MES_TRATADO']];
                if(row.CANAL) channels.add(harmonizarCanal(row.CANAL));
                if(row.STATUS_LOG) statusLogs.add(row.STATUS_LOG.trim());
            });
            let currentYearSel = yearSelect.value;
            yearSelect.innerHTML = '<option value="ALL">Todos os Anos</option>';
            Array.from(anos).sort().forEach(ano => { yearSelect.innerHTML += `<option value="${ano}">${ano}</option>`; });
            yearSelect.value = currentYearSel;
            monthSelect.innerHTML = '<option value="ALL">Todos os Meses</option>';
            Object.keys(mesesValidos).sort().forEach(m => { monthSelect.innerHTML += `<option value="${mesesValidos[m]}">${mesesValidos[m]}</option>`; });
            populateDropdown(channelSelect, channels, "Todos os Canais B2C");
            populateDropdown(statusLogFilter, statusLogs, "Todos os Status");
            document.getElementById('filterSection').classList.remove('opacity-50');
            [yearSelect, monthSelect, searchInput, channelSelect, statusLogFilter].forEach(el => el.disabled = false);
        }

        function populateDropdown(element, set, labelDefault) {
            let curr = element.value; element.innerHTML = `<option value="ALL">${labelDefault}</option>`;
            Array.from(set).sort().forEach(val => { if(val) element.innerHTML += `<option value="${val}">${val}</option>`; });
            element.value = curr;
        }

        function setupKpiClick(cardId, typeValue) {
            document.getElementById(cardId).addEventListener('click', () => {
                document.querySelectorAll('.clickable-card').forEach(c => c.classList.remove('active-card'));
                document.getElementById(cardId).classList.add('active-card');
                currentKpiFilter = typeValue; applyFiltersAndRender(); 
            });
        }

        setupKpiClick('cardTotal', 'ALL'); setupKpiClick('cardAtendidos', 'FATURADO'); setupKpiClick('cardDevolucoes', 'CANCELADO'); setupKpiClick('cardAguarda', 'PENDENTE');
        [yearSelect, monthSelect, channelSelect, statusLogFilter, criticalSelect].forEach(el => el.addEventListener('change', () => applyFiltersAndRender()));
        searchInput.addEventListener('input', () => applyFiltersAndRender());

        function atualizarBlocosInsightsLocais(m) {
            const secTitle = document.getElementById('insightSectionTitle');
            const secIcon = document.getElementById('sectionIcon');
            const t1 = document.getElementById('insightTitle1'); const i1 = document.getElementById('insightIcon1'); const c1 = document.getElementById('insightContent1');
            const t2 = document.getElementById('insightTitle2'); const i2 = document.getElementById('insightIcon2'); const c2 = document.getElementById('insightContent2');
            const t3 = document.getElementById('insightTitle3'); const i3 = document.getElementById('insightIcon3'); const c3 = document.getElementById('insightContent3');

            if (currentKpiFilter === 'ALL') {
                secIcon.innerText = "📋"; secTitle.innerText = "MONITORAMENTO COGNITIVO: VISÃO GLOBAL DA OPERAÇÃO";
                t1.innerText = "Volumetria Comercial B2C"; i1.innerText = "📊";
                c1.innerHTML = `<p>• <b>Volume Mapeado:</b> ${m.total.toLocaleString('pt-BR')} ordens operacionais.</p><p>• <b>Taxa de Conversão:</b> Atualmente em <span class="text-green-400 font-bold">${m.txConv}%</span>.</p><p>• <b>Faturados:</b> ${m.atendidos.toLocaleString('pt-BR')} pedidos concluídos.</p>`;
                t2.innerText = "Saúde de Conta & Reputação"; i2.innerText = "🛡️";
                let statusRep = m.txCanc <= 3 ? "✅ SAUDÁVEL" : "🚨 RFE EM RISCO (Penalização)";
                c2.innerHTML = `<p>• <b>Índice de Quebra:</b> Fixado em <span class="text-red-400 font-bold">${m.txCanc}%</span> (${m.devolucoes} cancelados).</p><p>• <b>Travas na API:</b> Detectadas <span class="text-amber-400 font-bold">${m.apiTravaCount}</span> ordens retidas.</p><p class="mt-2 text-[11px] text-gray-400 border-t border-gray-800/50 pt-1"><b>Score de Reputação:</b> ${statusRep}</p>`;
                t3.innerText = "Desempenho vs Benchmark"; i3.innerText = "🏁";
                let delta = (m.txConv - 94.0).toFixed(1);
                c3.innerHTML = `<p>• <b>Média do Segmento:</b> O benchmark para saúde digital é de <b>94.0%</b>.</p><p>• <b>Posição MA Hospitalar:</b> A operação está <span class="text-purple-400 font-bold">${delta >= 0 ? '+'+delta : delta}% ${delta >= 0 ? 'acima' : 'abaixo'} do mercado</span>.</p><p>• <b>Fila Viva Retida:</b> Há ${m.aguardaAtendimento} pedidos aguardando liberação logistica.</p>`;
            } else if (currentKpiFilter === 'FATURADO') {
                secIcon.innerText = "✅"; secTitle.innerText = "DIAGNÓSTICO COGNITIVO: PEDIDOS ATENDIDOS (SUCESSO)";
                t1.innerText = "Eficiência de Escoamento"; i1.innerText = "⚡";
                c1.innerHTML = `<p>• <b>Volume Despachado:</b> O ecossistema processou com sucesso <span class="text-green-400 font-bold">${m.atendidos.toLocaleString('pt-BR')}</span> NFs.</p><p>• <b>Aproveitamento Líquido:</b> Representa <span class="text-blue-400 font-bold">${m.txConv}%</span> da demanda.</p>`;
                t2.innerText = "Garantia de Entrega (SLA)"; i2.innerText = "🚚";
                c2.innerHTML = `<p>• <b>Rastreamento Ativo:</b> Envios rápidos diminuem o tempo de contato pós-venda em até 35%.</p>`;
                t3.innerText = "Maturidade da Operação"; i3.innerText = "🏆";
                c3.innerHTML = `<p>• <b>Faturamento Consolidado:</b> Sem gargalos de emissão pendentes no Protheus.</p>`;
            } else if (currentKpiFilter === 'CANCELADO') {
                secIcon.innerText = "🚨"; secTitle.innerText = "DIAGNÓSTICO COGNITIVO: DEVOLUÇÕES & CANCELAMENTOS";
                t1.innerText = "Análise Crítica de Perdas"; i1.innerText = "❌";
                c1.innerHTML = `<p>• <b>Pedidos Quebrados:</b> Foram perdidas <span class="text-red-400 font-bold">${m.devolucoes.toLocaleString('pt-BR')}</span> vendas.</p><p>• <b>Maior Ofensor:</b> <b>${obterMaiorOfensor(m.motivosContagem)}</b>.</p>`;
                t2.innerText = "Risco de Custos Ocultos"; i2.innerText = "📉";
                c2.innerHTML = `<p>• <b>Logística Reversa:</b> Canais reduzem exposição se a taxa ultrapassar 3%.</p>`;
                t3.innerText = "Plano de Mitigação de IA"; i3.innerText = "🛠️";
                c3.innerHTML = `<p>• <b>Ação de Ruptura:</b> Ajustar o sincronismo de estoque via API com o Protheus.</p>`;
            } else if (currentKpiFilter === 'PENDENTE') {
                secIcon.innerText = "⏳"; secTitle.innerText = "DIAGNÓSTICO COGNITIVO: AGUARDA ATENDIMENTO";
                t1.innerText = "Mapeamento do Gargalo"; i1.innerText = "⏱️";
                c1.innerHTML = `<p>• <b>Volume Retido:</b> Existem <span class="text-amber-400 font-bold">${m.aguardaAtendimento.toLocaleString('pt-BR')}</span> pedidos na fila viva.</p>`;
                t2.innerText = "Bloqueios Tecnológicos (API)"; i2.innerText = "🔌";
                c2.innerHTML = `<p>• <b>Falha Linx/Protheus:</b> Foram encontradas <span class="text-red-400 font-bold">${m.apiTravaCount}</span> ordens travadas.</p>`;
                t3.innerText = "Projeção de Escoamento"; i3.innerText = "📈";
                c3.innerHTML = `<p>• <b>Fila Limpa:</b> Priorizar canais B2C com regras de envio no mesmo dia.</p>`;
            }
        }

        function obterMaiorCanal(canaisObj) {
            if(!canaisObj || Object.keys(canaisObj).length === 0) return "SITE E-COMMERCE B2C";
            return Object.keys(canaisObj).reduce((a, b) => canaisObj[a] > canaisObj[b] ? a : b);
        }

        function obterMaiorOfensor(motivosObj) {
            if(!motivosObj || Object.keys(motivosObj).length === 0) return "Falta de Estoque / Ruptura";
            return Object.keys(motivosObj).reduce((a, b) => motivosObj[a] > motivosObj[b] ? a : b);
        }

        function applyFiltersAndRender() {
            const yearVal = yearSelect.value; const monthVal = monthSelect.value; const searchVal = searchInput.value.toUpperCase();
            const channelVal = channelSelect.value; const statusVal = statusLogFilter.value; const criticalVal = criticalSelect.value;

            let baseFiltered = rawDatabase.filter(row => {
                let matchYear = (yearVal === 'ALL' || row['ANO_TRATADO'] === yearVal);
                let matchMonth = (monthVal === 'ALL' || nomeMeses[row['MES_TRATADO']] === monthVal);
                let matchSearch = !searchVal || Object.values(row).join(' ').toUpperCase().includes(searchVal);
                let matchChannel = (channelVal === 'ALL' || harmonizarCanal(row.CANAL) === channelVal);
                let matchStatusLog = (statusVal === 'ALL' || row.STATUS_LOG === statusVal);
                
                let matchCritical = true;
                if (criticalVal === 'PENDENTES_VIVOS') matchCritical = row['STATUS_CONSOLIDADO'] === 'PENDENTE';
                else if (criticalVal === 'PENDENTES_NAO_TRATADOS') matchCritical = (row['STATUS_CONSOLIDADO'] === 'PENDENTE' && !pedidosTratadosManualmente.has(row.PEDIDO));
                else if (criticalVal === 'TRAVA_INTEGRACAO') matchCritical = row['RISCO_INTEGRACAO'] === true;
                
                return matchYear && matchMonth && matchSearch && matchChannel && matchStatusLog && matchCritical;
            });

            globalTableData = baseFiltered.filter(row => currentKpiFilter === 'ALL' || row['STATUS_CONSOLIDADO'] === currentKpiFilter);
            document.getElementById('activeRows').innerText = globalTableData.length.toLocaleString('pt-BR');
            processAndRender(baseFiltered, globalTableData);
        }

        function processAndRender(baseData, tableData) {
            let mesesData = {}; let motivosContagem = {}; let canaisContagem = {};
            let total = baseData.length; let atendidos = 0; let devolucoes = 0; let aguardaAtendimento = 0; let apiTravaCount = 0;

            baseData.forEach(row => {
                if(row['STATUS_CONSOLIDADO'] === 'FATURADO') atendidos++;
                else if(row['STATUS_CONSOLIDADO'] === 'CANCELADO') devolucoes++;
                else if(row['STATUS_CONSOLIDADO'] === 'PENDENTE') aguardaAtendimento++;
                if(row['RISCO_INTEGRACAO']) apiTravaCount++;

                let canalNome = harmonizarCanal(row.CANAL);
                canaisContagem[canalNome] = (canaisContagem[canalNome] || 0) + 1;

                if (row['STATUS_CONSOLIDADO'] === 'CANCELADO') {
                    let mot = "Falta de Estoque / Ruptura";
                    let obs = row.OBSERVACOES.toUpperCase();
                    if(obs.includes("DESIST") || obs.includes("CLIENTE") || obs.includes("COMPRADOR")) mot = "Arrependimento de Compra (B2C)";
                    else if(obs.includes("INTEGRA") || obs.includes("API")) mot = "Erro Sincronismo Hub/Preço";
                    motivosContagem[mot] = (motivosContagem[mot] || 0) + 1;
                }

                let sortKey = row['PERIODO_SORT'];
                if (!mesesData[sortKey]) mesesData[sortKey] = { label: row['PERIODO_LABEL'], total: 0, faturado: 0 };
                mesesData[sortKey].total++;
                if (row['STATUS_CONSOLIDADO'] === 'FATURADO') mesesData[sortKey].faturado++;
            });

            globalMesesDataCache = mesesData; 

            let txConv = total > 0 ? ((atendidos / total) * 100).toFixed(1) : 0;
            let txCanc = total > 0 ? ((devolucoes / total) * 100).toFixed(1) : 0;
            let txPend = total > 0 ? ((aguardaAtendimento / total) * 100).toFixed(1) : 0;

            globalLastCalculatedMetrics = { total, atendidos, devolucoes, aguardaAtendimento, txConv, txCanc, txPend, apiTravaCount, motivosContagem, canaisContagem };

            document.getElementById('kpiTotal').innerText = total.toLocaleString('pt-BR');
            document.getElementById('kpiAtendidos').innerText = atendidos.toLocaleString('pt-BR');
            document.getElementById('kpiDevolucoes').innerText = devolucoes.toLocaleString('pt-BR');
            document.getElementById('kpiAguardaAtendimento').innerText = aguardaAtendimento.toLocaleString('pt-BR');

            document.getElementById('pctAtendidos').innerText = `${txConv}%`;
            document.getElementById('pctDevolucoes').innerText = `${txCanc}%`;
            document.getElementById('pctPendente').innerText = `${txPend}%`;

            atualizarBlocosInsightsLocais(globalLastCalculatedMetrics);

            const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
            if(tableData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="13" class="p-4 text-center text-gray-500">Nenhum registro encontrado para este filtro.</td></tr>`;
            } else {
                tableData.forEach(item => {
                    let tr = document.createElement('tr'); tr.className = "border-b border-gray-800/60 hover:bg-[#161f33]/40 text-[11px]";
                    let badgeStatus = item.STATUS_CONSOLIDADO === 'FATURADO' ? "bg-green-950 text-green-400 border border-green-900/40" : (item.STATUS_CONSOLIDADO === 'CANCELADO' ? "bg-red-950 text-red-400 border border-red-900/40" : "bg-orange-950 text-orange-400 border border-orange-900/30");
                    let isChecked = pedidosTratadosManualmente.has(item.PEDIDO);

                    tr.innerHTML = `
                        <td class="p-3 text-center"><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="togglePedidoTratado('${item.PEDIDO}')" class="w-3.5 h-3.5 accent-blue-500 rounded border-gray-700 bg-gray-900 cursor-pointer"></td>
                        <td class="p-3"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${badgeStatus}">${item.STATUS_CONSOLIDADO}</span></td>
                        <td class="p-3 text-white font-semibold ${isChecked ? 'line-through text-gray-500 opacity-60' : ''}">${item.ACAO_OPERACIONAL}</td>
                        <td class="p-3 text-gray-400">${item.DATA || '---'}</td>
                        <td class="p-3 text-gray-200 font-semibold">${harmonizarCanal(item.CANAL)}</td>
                        <td class="p-3 font-mono text-blue-400 font-bold">${item.PEDIDO || '---'}</td>
                        <td class="p-3 text-gray-400">${item.STATUS_LOG || '---'}</td>
                        <td class="p-3 text-gray-400">${item.STATUS_LINX || '---'}</td>
                        <td class="p-3 font-mono text-gray-300">${item.PV_PROTHEUS || '---'}</td>
                        <td class="p-3 font-mono text-gray-300">${item.NOTA || '---'}</td>
                        <td class="p-3 text-amber-400">${item.PREVISAO || '---'}</td>
                        <td class="p-3 text-blue-300 font-mono">${item.RASTREIO || '---'}</td>
                        <td class="p-3 text-gray-400 max-w-xs truncate" title="${item.OBSERVACOES || ''}">${item.OBSERVACOES || '---'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            renderCharts(mesesData, motivosContagem);
        }

        // 🧠 NOVO ENGINE COGNITIVO COM INTERPRETAÇÃO ESTATÍSTICA DE NÚMEROS
        function executarPromptIA() {
            const prompt = iaInput.value.toLowerCase().trim();
            if (!prompt) return;

            iaResponseBox.classList.remove('hidden');
            let resposta = "";
            let acaoFiltro = null;
            let m = globalLastCalculatedMetrics;

            if (!m.total || m.total === 0) {
                iaResponseBox.innerHTML = "⚠️ <b>Erro do Assistente:</b> Por favor, carregue os arquivos de dados primeiro para que eu possa computar os insights.";
                return;
            }

            // 1. Total Geral de Pedidos na Série
            if (prompt.includes("total de pedidos") || prompt.includes("numero total") || prompt.includes("quantos pedidos")) {
                resposta = `📈 <b>Auditoria Estatística B2C:</b> O volume histórico consolidado na base atual conta com um acumulado de <b>${m.total.toLocaleString('pt-BR')} pedidos</b> processados pelos canais digitais. Desse total, <b>${m.atendidos.toLocaleString('pt-BR')}</b> foram faturados com sucesso (conversão de <b>${m.txConv}%</b>), <b>${m.devolucoes.toLocaleString('pt-BR')}</b> foram perdidos e <b>${m.aguardaAtendimento.toLocaleString('pt-BR')}</b> permanecem retidos aguardando tratamento na fila de expedição.`;
            }
            // 2. Análise do Melhor Mês em Vendas (Faturados)
            else if (prompt.includes("melhor mes") || prompt.includes("mes que mais vendeu") || prompt.includes("maior faturamento")) {
                let melhorPeriodo = ""; let maxFaturado = -1;
                Object.keys(globalMesesDataCache).forEach(k => {
                    if (globalMesesDataCache[k].faturado > maxFaturado) {
                        maxFaturado = globalMesesDataCache[k].faturado;
                        melhorPeriodo = globalMesesDataCache[k].label;
                    }
                });
                resposta = `🏆 <b>Performance Comercial Líder:</b> O pico de conversão da operação ocorreu no mês de <b>${melhorPeriodo}</b>. Nesse intervalo, o ecossistema registrou o maior volume de sucesso da série histórica, com <b>${maxFaturado.toLocaleString('pt-BR')} ordens de venda totalmente faturadas</b> e integradas ao ERP Protheus.`;
            } 
            // 3. Identificação do Pior Mês em Vendas / Cancelamentos
            else if (prompt.includes("pior mes") || prompt.includes("menos vendeu") || prompt.includes("maior queda")) {
                let piorPeriodo = ""; let minFaturado = Infinity;
                Object.keys(globalMesesDataCache).forEach(k => {
                    if (globalMesesDataCache[k].faturado < minFaturado && globalMesesDataCache[k].faturado > 0) {
                        minFaturado = globalMesesDataCache[k].faturado;
                        piorPeriodo = globalMesesDataCache[k].label;
                    }
                });
                resposta = `📉 <b>Diagnóstico de Baixa Volumetria:</b> O ponto de maior retração na entrega líquida de pedidos foi mapeado no mês de <b>${piorPeriodo}</b>, atingindo apenas <b>${minFaturado.toLocaleString('pt-BR')} faturamentos concluídos</b>. Recomendo cruzar esse período com relatórios de ruptura de estoque ou instabilidades graves nas chaves de API.`;
            }
            // 4. Mapeamento de Canais Líderes e Mix de Vendas
            else if (prompt.includes("canal") || prompt.includes("marketplace") || prompt.includes("onde vende")) {
                let maiorCanal = obterMaiorCanal(m.canaisContagem);
                let volumeCanal = m.canaisContagem[maiorCanal] || 0;
                let share = ((volumeCanal / m.total) * 100).toFixed(1);
                resposta = `🏪 <b>Análise de Mix de Canais:</b> O polo centralizador de vendas sob esta visão é o <b>${maiorCanal}</b>, dominando a operação com <b>${volumeCanal.toLocaleString('pt-BR')} ordens geradas</b> — o que representa uma fatia de <b>${share}% de share comercial</b> sobre o volume total da carteira digital da MA Hospitalar.`;
            }
            // 5. Diagnóstico de Principais Ofensores de Quebra
            else if (prompt.includes("problema") || prompt.includes("ofensor") || prompt.includes("motivo") || prompt.includes("cancelado")) {
                let maiorOfensor = obterMaiorOfensor(m.motivosContagem);
                let volumeOfensor = m.motivosContagem[maiorOfensor] || 0;
                resposta = `🚨 <b>Vulnerabilidade Operacional Mapeada:</b> A maior causa de cancelamentos e atritos com clientes B2C é a categoria: <b>"${maiorOfensor}"</b>, registrando sozinha <b>${volumeOfensor} ocorrências diretas</b>. Isso indica a necessidade imediata de calibrar o tempo de atualização preventiva de estoque entre o Protheus e o Hub.`;
            }
            // 6. Fila Viva de Atendimento e Alertas de API
            else if (prompt.includes("pendente") || prompt.includes("aguarda") || prompt.includes("fila viva") || prompt.includes("api")) {
                acaoFiltro = () => {
                    document.querySelectorAll('.clickable-card').forEach(c => c.classList.remove('active-card'));
                    document.getElementById('cardAguarda').classList.add('active-card');
                    currentKpiFilter = 'PENDENTE';
                    criticalSelect.value = "ALL";
                };
                resposta = `🔌 <b>Auditoria de Gargalos Tecnológicos:</b> Identificamos <b>${m.aguardaAtendimento.toLocaleString('pt-BR')} pedidos retidos na Fila Viva</b>. Destes, <span class="text-red-400 font-bold"><b>${m.apiTravaCount} ordens sofrem de trava de integração direta</b></span> (o status acusa venda no canal, mas a nota não foi transmitida). Mudei a tela para exibir essa lista crítica agora.`;
            }
            // 7. Resposta Dinâmica de Busca Textual Livre
            else {
                let termo = iaInput.value.toUpperCase();
                let correspondencias = rawDatabase.filter(r => Object.values(r).join(' ').toUpperCase().includes(termo)).length;
                resposta = `🔍 <b>Filtro de Varredura Aplicado:</b> Varri as planilhas pelo termo "<b>${iaInput.value}</b>" e localizei <b>${correspondencias} correspondências diretas</b> na base de dados. A tabela principal foi atualizada para exibir esses registros isolados.`;
                searchInput.value = iaInput.value;
            }

            if(acaoFiltro) acaoFiltro();
            applyFiltersAndRender();
            iaResponseBox.innerHTML = resposta;
        }

        iaBtn.addEventListener('click', executarPromptIA);
        iaInput.addEventListener('keypress', e => { if (e.key === 'Enter') executarPromptIA(); });

        function renderCharts(mesesData, motivosContagem) {
            if (chartMensal) chartMensal.destroy(); if (chartMotivos) chartMotivos.destroy();
            let sortedKeys = Object.keys(mesesData).sort();
            let labelsMeses = sortedKeys.map(key => { let [ano, m] = key.split('-'); return `${nomeMeses[m].substring(0,3)}/${ano}`; });
            if(labelsMeses.length === 0) labelsMeses = ["Sem dados"];

            const ctx1 = document.getElementById('chartMensal').getContext('2d');
            chartMensal = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: labelsMeses,
                    datasets: [
                        { label: 'Recebidos (B2C)', data: sortedKeys.length > 0 ? sortedKeys.map(k => mesesData[k].total) : [0], backgroundColor: '#2563eb', order: 2 },
                        { label: 'Faturados', data: sortedKeys.length > 0 ? sortedKeys.map(k => mesesData[k].faturado) : [0], backgroundColor: '#10b981', order: 3 },
                        { label: 'Entrega B2C (%)', data: sortedKeys.length > 0 ? sortedKeys.map(k => mesesData[k].total > 0 ? ((mesesData[k].faturado / mesesData[k].total) * 100).toFixed(1) : 0) : [0], type: 'line', borderColor: '#a855f7', borderWidth: 2, pointBackgroundColor: '#c084fc', tension: 0.2, fill: false, yAxisID: 'yPerc', order: 1 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 } } } }, scales: { y: { position: 'left', grid: { color: '#1e293b' }, ticks: { color: '#9ca3af' } }, yPerc: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#c084fc', callback: v => v + '%' }, min: 0, max: 100 }, x: { ticks: { color: '#9ca3af' } } } }
            });

            const ctx2 = document.getElementById('chartMotivos').getContext('2d');
            let temMotivos = Object.keys(motivosContagem).length > 0;
            chartMotivos = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: temMotivos ? Object.keys(motivosContagem) : ["Falta de Estoque", "Arrependimento B2C", "Erro de API"],
                    datasets: [{ data: temMotivos ? Object.values(motivosContagem) : [70, 15, 4], backgroundColor: ['#f97316', '#3b82f6', '#ef4444'], borderColor: '#121826' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af', font: { size: 10 } } } } }
            });
        }

        document.getElementById('btnExportInsights').addEventListener('click', () => {
            const m = globalLastCalculatedMetrics; if(!m.total) return;
            let out = [];
            out.push("=======================================================================");
            out.push("    MA HOSPITALAR - AUDITORIA DE INTELIGÊNCIA OPERACIONAL DE MERCADO    ");
            out.push("=======================================================================");
            out.push(`Foco do Relatório: ${currentKpiFilter === 'ALL' ? 'GLOBAL' : currentKpiFilter}`);
            out.push(`Extraído em: ${new Date().toLocaleDateString('pt-BR')}`);
            out.push(`MÉTRICAS BASE:\n• Total do Filtro: ${m.total}\n• Faturados: ${m.atendidos}\n• Cancelados: ${m.devolucoes}`);
            let blob = new Blob([out.join("\n")], { type: 'text/plain;charset=utf-8;' });
            let url = URL.createObjectURL(blob); let link = document.createElement("a");
            link.setAttribute("href", url); link.setAttribute("download", `MA_Hospitalar_Insights_${currentKpiFilter}.txt`);
            link.click();
        });

        document.getElementById('btnExportar').addEventListener('click', () => {
            if(globalTableData.length === 0) return;
            let csvRows = [];
            csvRows.push(`"MA HOSPITALAR - RELATÓRIO CONSOLIDADO OPERACIONAL CANAIS B2C"`);
            csvRows.push(`"CHECK (TRATADO)";"STATUS CONSOLIDADO";"AÇÃO OPERACIONAL CORRETIVA";"DATA EMISSÃO";"CANAL / MARKETPLACE B2C";"Nº DO PEDIDO";"STATUS LOGÍSTICA";"STATUS LINX";"PV PROTHEUS";"NOTA FISCAL";"PREVISÃO ENTREGA";"CÓDIGO RASTREIO";"OBSERVACOES OPERACIONAIS"`);
            globalTableData.forEach(r => {
                let checkStatus = pedidosTratadosManualmente.has(r.PEDIDO) ? "CONCLUÍDO MANUALMENTE" : "PENDENTE NO HUB";
                let rowText = [`"${checkStatus}"`, `"${r.STATUS_CONSOLIDADO}"`, `"${r.ACAO_OPERACIONAL}"`, `"${r.DATA || ''}"`, `"${harmonizarCanal(r.CANAL)}"`,`"${r.PEDIDO || ''}"`, `"${r.STATUS_LOG || ''}"`, `"${r.STATUS_LINX || ''}"`, `"${r.PV_PROTHEUS || ''}"`,`"${r.NOTA || ''}"`, `"${r.PREVISAO || ''}"`, `"${r.RASTREIO || ''}"`, `"${(r.OBSERVACOES || '').replace(/"/g, '""')}"` ];
                csvRows.push(rowText.join(";"));
            });
            let blob = new Blob(["\uFEFF" + csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' });
            let url = URL.createObjectURL(blob); let link = document.createElement("a");
            link.setAttribute("href", url); link.setAttribute("download", `MA_Hospitalar_Relatorio_B2C.csv`);
            link.click();
        });

        document.getElementById('btnResetAll').addEventListener('click', () => {
            yearSelect.value = 'ALL'; monthSelect.value = 'ALL'; searchInput.value = ''; channelSelect.value = 'ALL'; statusLogFilter.value = 'ALL'; criticalSelect.value = 'ALL';
            iaInput.value = ''; iaResponseBox.classList.add('hidden');
            pedidosTratadosManualmente.clear();
            document.querySelectorAll('.clickable-card').forEach(c => c.classList.remove('active-card'));
            document.getElementById('cardTotal').classList.add('add', 'active-card'); currentKpiFilter = 'ALL';
            applyFiltersAndRender();
        });
    </script>
